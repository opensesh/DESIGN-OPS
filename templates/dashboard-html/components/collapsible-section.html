<!--
  Collapsible Section Component

  A container with a clickable header that expands/collapses content.
  Used for organizing subcategories within pillars.

  Variables:
    {{ID}}            - Unique identifier for the section
    {{TITLE}}         - Section title (e.g., "Meetings & Schedule")
    {{SUBTITLE}}      - Summary text (e.g., "4 meetings today")
    {{ICON}}          - Lucide icon name
    {{ICON_BG_COLOR}} - Background color for icon container
    {{ICON_COLOR}}    - Icon color
    {{IS_OPEN}}       - Boolean: whether section starts expanded
    {{CONTENT}}       - Inner content (KPIs, lists, etc.)

  Data Format:
    {
      "type": "collapsible_section",
      "id": "meetings",
      "title": "Meetings & Schedule",
      "subtitle": "4 meetings today",
      "icon": "calendar",
      "icon_bg_color": "var(--color-brand-50)",
      "icon_color": "var(--color-aperol)",
      "is_open": true,
      "content": "..."
    }
-->

<div class="collapsible-section {{#IS_OPEN}}open{{/IS_OPEN}}" data-section="{{ID}}">
  <div class="collapsible-header" onclick="toggleSection(this)">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background-color: {{#ICON_BG_COLOR}}{{ICON_BG_COLOR}}{{/ICON_BG_COLOR}}{{^ICON_BG_COLOR}}var(--color-brand-50){{/ICON_BG_COLOR}};">
        <i data-lucide="{{ICON}}" class="w-4 h-4" style="color: {{#ICON_COLOR}}{{ICON_COLOR}}{{/ICON_COLOR}}{{^ICON_COLOR}}var(--color-aperol){{/ICON_COLOR}};"></i>
      </div>
      <div>
        <p class="text-sm font-medium" style="color: var(--fg-primary);">{{TITLE}}</p>
        <p class="text-xs" style="color: var(--fg-tertiary);">{{SUBTITLE}}</p>
      </div>
    </div>
    <i data-lucide="chevron-up" class="w-4 h-4 chevron" style="color: var(--fg-tertiary);"></i>
  </div>
  <div class="collapsible-content">
    {{CONTENT}}
  </div>
</div>
