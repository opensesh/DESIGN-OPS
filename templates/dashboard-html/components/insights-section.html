<!--
  Insights Section Component

  AI-generated insights displayed as cards at the bottom of the dashboard.

  Variables:
    {{INSIGHTS}}      - Array of insight items

  Insight Item Variables:
    {{INSIGHT_TITLE}}   - Short title (e.g., "Light meeting day")
    {{INSIGHT_TEXT}}    - Description (e.g., "2 fewer meetings than usual")
    {{INSIGHT_ICON}}    - Lucide icon name
    {{INSIGHT_BG_COLOR}} - Background color for icon

  Data Format:
    {
      "type": "insights_section",
      "insights": [
        {
          "title": "Light meeting day",
          "text": "2 fewer meetings than usual — great for deep work",
          "icon": "calendar-check",
          "bg_color": "var(--color-success-50)",
          "icon_color": "var(--color-success-500)"
        }
      ]
    }
-->

{{#HAS_INSIGHTS}}
<div class="mt-10">
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, var(--color-brand-50) 0%, var(--color-brand-100) 100%);">
        <i data-lucide="lightbulb" class="w-4 h-4" style="color: var(--color-aperol);"></i>
      </div>
      <h2 class="text-sm font-semibold" style="color: var(--fg-primary);">Insights</h2>
    </div>
    <span class="text-xs px-2 py-1 rounded-full" style="background-color: var(--bg-tertiary); color: var(--fg-quaternary);">AI-generated</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    {{#INSIGHTS}}
    <div class="rounded-2xl border p-5 card-interactive group" style="background-color: var(--bg-secondary); border-color: var(--border-secondary);">
      <div class="flex items-start gap-4">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 transition-transform group-hover:scale-110" style="background-color: {{#INSIGHT_BG_COLOR}}{{INSIGHT_BG_COLOR}}{{/INSIGHT_BG_COLOR}}{{^INSIGHT_BG_COLOR}}var(--color-success-50){{/INSIGHT_BG_COLOR}};">
          <i data-lucide="{{INSIGHT_ICON}}" class="w-5 h-5" style="color: {{#INSIGHT_ICON_COLOR}}{{INSIGHT_ICON_COLOR}}{{/INSIGHT_ICON_COLOR}}{{^INSIGHT_ICON_COLOR}}var(--color-success-500){{/INSIGHT_ICON_COLOR}};"></i>
        </div>
        <div>
          <p class="text-sm font-medium mb-1" style="color: var(--fg-primary);">{{INSIGHT_TITLE}}</p>
          <p class="text-xs leading-relaxed" style="color: var(--fg-tertiary);">{{INSIGHT_TEXT}}</p>
        </div>
      </div>
    </div>
    {{/INSIGHTS}}
  </div>
</div>
{{/HAS_INSIGHTS}}
