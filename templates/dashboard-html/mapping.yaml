# Component Mapping Rules
#
# Defines how data types map to dashboard components.
# The LLM uses these rules to select the appropriate component
# for each piece of data fetched from MCP tools.
#
# Version: 2.0 - Added normalized data contracts for tool-agnostic architecture

version: "2.0"

# ============================================================================
# NORMALIZED DATA CONTRACTS
# ============================================================================
# These contracts define the standard data shape for each type of information.
# Adapters transform raw tool output into these normalized formats.
# This enables tool-agnostic templates that work with any connected service.

normalized_contracts:

  # SCHEDULE (Operations pillar)
  # Works for: Google Calendar, Outlook, iCal, Notion Calendar
  schedule_event:
    description: "A single calendar event or scheduled item"
    fields:
      title: { type: string, required: true }
      subtitle: { type: string, description: "Meeting type or attendees" }
      time: { type: string, required: true, description: "Formatted time e.g. '9:00 AM'" }
      end_time: { type: string, description: "End time if duration shown" }
      url: { type: string, description: "Link to event" }
      status: { type: enum, values: [upcoming, in_progress, past, cancelled] }
      source: { type: string, description: "Tool name e.g. 'Google Calendar'" }
    example:
      title: "Weekly Design Sync"
      subtitle: "Product Team"
      time: "10:00 AM"
      status: "upcoming"
      url: "https://calendar.google.com/event?eid=xxx"
      source: "Google Calendar"

  # TASKS (Operations pillar)
  # Works for: Notion, Linear, Asana, Jira, Todoist, GitHub Issues
  task_item:
    description: "A single task or issue"
    fields:
      title: { type: string, required: true }
      subtitle: { type: string, description: "Project name or priority" }
      status: { type: enum, values: [pending, in_progress, completed, blocked], required: true }
      due: { type: string, description: "Due date/time or null" }
      priority: { type: enum, values: [low, medium, high, urgent] }
      url: { type: string }
      assignee: { type: string }
      source: { type: string }
    example:
      title: "Update dashboard components"
      subtitle: "DESIGN-OPS"
      status: "in_progress"
      due: "Today"
      priority: "high"
      url: "https://notion.so/xxx"
      source: "Notion"

  # CODE ACTIVITY (Design pillar)
  # Works for: GitHub, GitLab, Bitbucket
  code_activity:
    description: "A commit, PR, or code review event"
    fields:
      title: { type: string, required: true, description: "Commit message or PR title" }
      subtitle: { type: string, description: "Author · branch" }
      type: { type: enum, values: [commit, pr_open, pr_merged, pr_closed, review, issue], required: true }
      time: { type: string, required: true, description: "'2h ago' or timestamp" }
      url: { type: string }
      author: { type: string }
      repo: { type: string }
      source: { type: string }
    example:
      title: "feat: add skeleton loading states"
      subtitle: "alex · main"
      type: "commit"
      time: "2h ago"
      url: "https://github.com/org/repo/commit/abc123"
      source: "GitHub"

  # CREATIVE ACTIVITY (Design pillar)
  # Works for: Figma, Sketch, Adobe XD, Canva
  creative_activity:
    description: "A design file edit, version, or comment"
    fields:
      title: { type: string, required: true, description: "File or component name" }
      subtitle: { type: string, description: "Editor · page" }
      type: { type: enum, values: [edit, version, comment, component_update], required: true }
      time: { type: string, required: true }
      url: { type: string }
      editor: { type: string }
      source: { type: string }
    example:
      title: "Dashboard Wireframes"
      subtitle: "Jordan · Components page"
      type: "edit"
      time: "30m ago"
      url: "https://figma.com/file/xxx"
      source: "Figma"

  # TRAFFIC METRICS (Analytics pillar)
  # Works for: Google Analytics, Plausible, Fathom, Vercel Analytics
  traffic_metric:
    description: "Web traffic statistics for a time period"
    fields:
      pageviews: { type: number, required: true }
      visitors: { type: number }
      sessions: { type: number }
      avg_session_duration: { type: string, description: "Formatted as '2:34'" }
      bounce_rate: { type: string, description: "Formatted as '42%'" }
      top_pages: { type: array, items: { path: string, views: number } }
      trend: { type: string, description: "'+12%' or '-5%'" }
      period: { type: string, description: "Time period for data" }
      source: { type: string }
    example:
      pageviews: 12450
      visitors: 4230
      avg_session_duration: "2:34"
      bounce_rate: "42%"
      trend: "+12%"
      source: "Google Analytics"

  # LINK METRICS (Analytics pillar)
  # Works for: Dub.co, Bitly, Short.io
  link_metric:
    description: "Link tracking statistics"
    fields:
      total_clicks: { type: number, required: true }
      total_links: { type: number }
      ctr: { type: string, description: "Click-through rate as '%'" }
      top_links: { type: array, items: { name: string, clicks: number, url: string } }
      trend: { type: string }
      period: { type: string }
      source: { type: string }
    example:
      total_clicks: 2340
      total_links: 45
      ctr: "3.2%"
      trend: "+8%"
      source: "Dub.co"

  # SOCIAL METRICS (Analytics pillar)
  # Works for: Instagram, Twitter, LinkedIn, YouTube, TikTok
  social_channel:
    description: "Social media channel metrics"
    fields:
      platform: { type: string, required: true }
      handle: { type: string }
      followers: { type: number, required: true }
      following: { type: number }
      engagement_rate: { type: string }
      growth: { type: number, description: "Follower change this period" }
      growth_percent: { type: string }
      top_posts: { type: array, items: { title: string, engagement: number, url: string } }
      url: { type: string }
      source: { type: string }
    example:
      platform: "Instagram"
      handle: "@opensesh"
      followers: 12500
      engagement_rate: "4.2%"
      growth: 340
      growth_percent: "+2.8%"
      source: "Instagram"

  # CONTENT METRICS (Analytics pillar)
  # Works for: Substack, Beehiiv, ConvertKit, Ghost
  content_metric:
    description: "Newsletter/content performance metrics"
    fields:
      subscribers: { type: number, required: true }
      subscriber_growth: { type: number }
      open_rate: { type: string }
      click_rate: { type: string }
      recent_posts: { type: array, items: { title: string, views: number, url: string } }
      trend: { type: string }
      source: { type: string }
    example:
      subscribers: 5200
      subscriber_growth: 120
      open_rate: "45%"
      click_rate: "8%"
      source: "Substack"

  # DATABASE/PRODUCT METRICS (Analytics pillar)
  # Works for: Supabase, Firebase, Amplitude, Mixpanel
  database_metric:
    description: "Database or product analytics"
    fields:
      total_users: { type: number }
      active_users: { type: number }
      new_users: { type: number }
      total_rows: { type: number }
      api_calls: { type: number }
      storage_used: { type: string }
      trend: { type: string }
      source: { type: string }
    example:
      total_users: 1250
      active_users: 890
      new_users: 45
      source: "Supabase"

# ============================================================================
# ADAPTER REGISTRY
# ============================================================================
# Maps specific tools to their adapter configurations.
# Each adapter knows how to transform raw API/MCP data into normalized contracts.

adapters:
  # Operations adapters
  google_calendar:
    transforms_to: schedule_event
    source_name: "Google Calendar"
    source_url: "https://calendar.google.com"
    mcp_tool: "mcp__google-workspace__list_events"

  notion_tasks:
    transforms_to: task_item
    source_name: "Notion"
    source_url: "https://notion.so"
    mcp_tool: "mcp__notion__API-query-data-source"

  linear_issues:
    transforms_to: task_item
    source_name: "Linear"
    source_url: "https://linear.app"
    mcp_tool: "mcp__linear__list_issues"

  # Design adapters
  github_activity:
    transforms_to: code_activity
    source_name: "GitHub"
    source_url: "https://github.com"
    mcp_tool: "mcp__github__list_commits"

  figma_activity:
    transforms_to: creative_activity
    source_name: "Figma"
    source_url: "https://figma.com"
    mcp_tool: "mcp__figma__get_metadata"

  # Analytics adapters
  google_analytics:
    transforms_to: traffic_metric
    source_name: "Google Analytics"
    source_url: "https://analytics.google.com"
    requires: GA4_PROPERTY_ID

  dub_links:
    transforms_to: link_metric
    source_name: "Dub.co"
    source_url: "https://dub.co"
    mcp_tool: "mcp__dubco__*"

  supabase_metrics:
    transforms_to: database_metric
    source_name: "Supabase"
    source_url: "https://supabase.com"
    mcp_tool: "mcp__supabase__*"

# ============================================================================
# SOURCE FOOTNOTE PATTERN
# ============================================================================
# Every data section should include a source footnote showing:
# - Which tool provided the data
# - When the data was last updated
# - Link to the source tool

source_footnote:
  description: "Footer for each data section showing data source"
  template: |
    <div class="source-footnote flex items-center justify-between text-xs mt-4 pt-3 border-t" style="border-color: var(--border-secondary);">
      <span class="text-fg-quaternary">Connected to
        <a href="{{SOURCE_URL}}" target="_blank" rel="noopener"
           class="text-fg-tertiary hover:text-aperol transition-colors">
          {{SOURCE_NAME}} ↗
        </a>
      </span>
      <span class="text-fg-quaternary">Updated {{UPDATED_TIME}}</span>
    </div>
  fields:
    SOURCE_NAME: { type: string, required: true, description: "Tool name e.g. 'GitHub'" }
    SOURCE_URL: { type: string, required: true, description: "Link to tool" }
    UPDATED_TIME: { type: string, required: true, description: "Relative time e.g. 'just now', '5m ago'" }

# ============================================================================
# DATA FRESHNESS INDICATORS
# ============================================================================
# Visual indicators for data age

freshness_indicators:
  fresh:
    description: "Data updated within last 5 minutes"
    text: "just now"
    style: "text-success-500"
  recent:
    description: "Data updated within last hour"
    text: "{{MINUTES}}m ago"
    style: "text-fg-tertiary"
  stale:
    description: "Data older than 1 hour"
    text: "{{HOURS}}h ago"
    style: "text-warning-500"
  very_stale:
    description: "Data older than 24 hours"
    text: "{{DAYS}}d ago"
    style: "text-error-500"
    show_warning: true

# ============================================================================

# Component definitions with selection criteria
mappings:

  # Single metric with optional trend
  single_metric:
    component: stat-card
    description: "Single number with optional trend indicator"
    data_shape:
      - "single value"
      - "number with comparison"
      - "count with change"
    examples:
      - tasks_due
      - total_clicks
      - session_count
      - unread_emails
      - open_prs
      - commits_today
    icons:
      tasks_due: "check-square"
      total_clicks: "mouse-pointer-click"
      session_count: "users"
      unread_emails: "mail"
      open_prs: "git-pull-request"
      commits_today: "git-commit"
      calendar_events: "calendar"
      pageviews: "eye"
      revenue: "dollar-sign"
    # Enhanced fields for interactivity
    url_patterns:
      tasks_due: "https://notion.so/..."
      open_prs: "https://github.com/{org}/{repo}/pulls"
      commits_today: "https://github.com/{org}/{repo}/commits"
      calendar_events: "https://calendar.google.com/..."
    hero_treatment:
      description: "First metric in each pillar gets hero treatment"
      applies_to: "first metric per pillar"
      style: "larger value, accent border-left"

  # Time series data (line chart)
  time_series:
    component: line-chart
    description: "Data points over time"
    data_shape:
      - "array with dates/timestamps"
      - "sequential measurements"
      - "trend over period"
    examples:
      - traffic_trends
      - commit_activity
      - weekly_sessions
      - monthly_revenue
      - quarter_comparison

  # Categorical comparisons (bar chart)
  categorical:
    component: bar-chart
    description: "Comparisons by category (up to 8 items)"
    data_shape:
      - "array of {label, value} pairs"
      - "ranked list with counts"
      - "category breakdown"
    max_items: 8
    examples:
      - top_links
      - team_contributions
      - page_rankings
      - pr_by_author
      - traffic_by_source

  # Activity/event lists
  activity_list:
    component: list-activity
    description: "Ordered events with timestamps and clickable links"
    data_shape:
      - "array of activities"
      - "events with times"
      - "action log"
    examples:
      - calendar_events
      - recent_commits
      - open_prs
      - design_updates
      - recent_deploys
    icons:
      calendar_events: "calendar"
      recent_commits: "git-commit"
      open_prs: "git-pull-request"
      design_updates: "figma"
      recent_deploys: "rocket"
      recent_pages: "file-text"
    # Enhanced fields for interactivity
    url_patterns:
      calendar_events: "https://calendar.google.com/event?eid={event_id}"
      recent_commits: "https://github.com/{org}/{repo}/commit/{sha}"
      open_prs: "https://github.com/{org}/{repo}/pull/{number}"
      design_updates: "https://figma.com/file/{file_key}"
      recent_deploys: "https://github.com/{org}/{repo}/actions/runs/{run_id}"
    interaction:
      hover_state: "bg-tertiary background"
      external_indicator: "↗ icon appears on hover"

  # Multi-column tabular data
  tabular:
    component: table-simple
    description: "Structured data with multiple columns"
    data_shape:
      - "array of objects with multiple properties"
      - "spreadsheet-like data"
    min_columns: 3
    examples:
      - quarter_goals
      - project_status
      - team_roster
      - budget_breakdown

  # Error states
  error:
    component: empty-state
    description: "Error conditions and required actions"
    variants:
      oauth_required:
        icon: "key"
        icon_color: "warning"
        message_template: "OAuth Required"
        guidance_template: "Run any {{TOOL}} command to complete authorization."
      api_key_missing:
        icon: "key"
        icon_color: "error"
        message_template: "API Key Missing"
        guidance_template: "Set {{ENV_VAR}} in your environment."
      not_configured:
        icon: "settings"
        icon_color: "info"
        message_template: "Not Configured"
        guidance_template: "Run /design-ops:configure to set up {{TOOL}}."
      connection_error:
        icon: "wifi-off"
        icon_color: "error"
        message_template: "Connection Error"
        guidance_template: "Check your network connection and try again."
      no_data:
        icon: "inbox"
        icon_color: "brand"
        message_template: "No Data"
        guidance_template: "No {{DATA_TYPE}} found for this timeframe."

# Selection logic for LLM
selection_rules:
  # Priority order when multiple mappings could apply
  priority:
    - error           # Always check for errors first
    - single_metric   # Single values are most specific
    - activity_list   # Lists with timestamps
    - time_series     # Temporal data
    - categorical     # Comparisons
    - tabular         # Fallback for structured data

  # Heuristics for automatic detection
  heuristics:
    - rule: "If data contains error field, use error component"
    - rule: "If data is single number, use single_metric"
    - rule: "If array items have 'time' or 'date' fields, prefer activity_list"
    - rule: "If array items have timestamp x-axis data, prefer time_series"
    - rule: "If array of {label, value} with ≤8 items, prefer categorical"
    - rule: "If array of {label, value} with >8 items, prefer tabular"
    - rule: "If array items have 3+ properties, consider tabular"

# Pillar-specific defaults
pillar_defaults:
  operations:
    primary_metrics:
      - calendar_events
      - tasks_due
      - unread_emails
    activity_types:
      - calendar_events
      - tasks

  design:
    primary_metrics:
      - commits_today
      - open_prs
    activity_types:
      - recent_commits
      - open_prs
      - design_updates

  analytics:
    primary_metrics:
      - pageviews
      - total_clicks
    chart_types:
      - top_links
      - traffic_trends

# Timeframe-specific component preferences
timeframe_preferences:
  daily:
    prefer_activity_lists: true
    prefer_single_metrics: true
    max_chart_items: 5

  weekly:
    prefer_charts: true
    prefer_comparisons: true
    max_chart_items: 7

  quarterly:
    prefer_tables: true
    prefer_trend_charts: true
    show_goal_progress: true

  ytd:
    prefer_summary_metrics: true
    prefer_comparison_charts: true
    show_annual_totals: true
