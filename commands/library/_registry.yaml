# DESIGN-OPS Utility Library Registry
# Manifest of ad-hoc commands organized by category
#
# Use /dcs:library to browse available commands
# Use /dcs:library [category] to filter by category

version: "1.0"

categories:
  logistics: "Meeting prep, kickoffs, and project coordination"
  content: "Content creation for social and marketing"
  development: "Research, analysis, and ideation tools"

commands:
  # ───────────────────────────────────────────────────────────────────────────
  # LOGISTICS — Meeting prep, kickoffs, and project coordination
  # ───────────────────────────────────────────────────────────────────────────

  - id: meeting-brief
    path: logistics/meeting-brief.md
    category: logistics
    description: "Create focused meeting agendas through guided questions"
    trigger: "/dcs:meeting-brief"
    tags: [meetings, planning, preparation]

  - id: meeting-recap
    path: logistics/meeting-recap.md
    category: logistics
    description: "Document meetings with summaries, decisions, and action items"
    trigger: "/dcs:meeting-recap"
    tags: [meetings, documentation, follow-up]

  - id: kickoff-prep
    path: logistics/kickoff-prep.md
    category: logistics
    description: "Generate project kickoff materials (agenda, brief, questions)"
    trigger: "/dcs:kickoff-prep"
    tags: [projects, kickoff, planning]

  # ───────────────────────────────────────────────────────────────────────────
  # CONTENT — Content creation for social and marketing
  # ───────────────────────────────────────────────────────────────────────────

  - id: social-post
    path: content/social-post.md
    category: content
    description: "Create platform-optimized social content (LinkedIn, Instagram, Substack)"
    trigger: "/dcs:social-post"
    tags: [social-media, content, marketing]

  # ───────────────────────────────────────────────────────────────────────────
  # DEVELOPMENT — Research, analysis, and ideation tools
  # ───────────────────────────────────────────────────────────────────────────

  - id: site-analysis
    path: development/site-analysis.md
    category: development
    description: "Deep website analysis with structure mapping and component detection"
    trigger: "/dcs:site-analysis"
    tags: [research, websites, analysis, architecture]

  - id: devils-advocate
    path: development/devils-advocate.md
    category: development
    description: "Challenge assumptions and stress-test your thinking"
    trigger: "/dcs:devils-advocate"
    tags: [ideation, critique, decision-making]
